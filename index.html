<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GenSoal AI</title>
  <link rel="icon" href="https://res.cloudinary.com/dfemxpojv/image/upload/v1778349580/ChatGPT_Image_May_10_2026_01_58_53_AM_k7x1ux.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0f172a;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    /* â”€â”€ Loading Screen â”€â”€ */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(79,70,229,0.4); }
      50%       { transform: scale(1.05); box-shadow: 0 12px 40px rgba(79,70,229,0.6); }
    }

    .loading-title {
      color: #e2e8f0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .loading-sub {
      color: #64748b;
      font-size: 13px;
    }

    /* Spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress bar */
    .progress-wrap {
      width: 200px;
      height: 4px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      border-radius: 999px;
      animation: progress 4s ease-out forwards;
    }
    @keyframes progress {
      0%   { width: 0%; }
      30%  { width: 40%; }
      60%  { width: 70%; }
      90%  { width: 90%; }
      100% { width: 95%; }
    }

    /* â”€â”€ iframe â”€â”€ */
    .iframe-container {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    iframe.loaded {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">🪐</div>
    <div class="loading-title">Gen_Soal v2.1</div>
    <div class="loading-sub">MyzkaTech System</div>
    <div class="spinner"></div>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <div class="loading-sub" id="loading-status">Menghubungkan ke server...</div>
  </div>

  <!-- App iframe -->
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbwHfX9Dh_V3mgaigZ07lAnjH6bYa9LXcTwP2Zyh-C1dsWXuBv2CtUWcckQzfjYF-dS2Xw/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>

  <script>
    var iframe = document.getElementById('app');
    var loadingScreen = document.getElementById('loading-screen');
    var statusText = document.getElementById('loading-status');
    var messages = [
      'Menghubungkan ke server...',
      'Memuat data aplikasi...',
      'Menyiapkan antarmuka...',
      'Hampir selesai...'
    ];
    var msgIdx = 0;

    // Ganti pesan loading setiap 2 detik
    var msgInterval = setInterval(function() {
      msgIdx = (msgIdx + 1) % messages.length;
      statusText.textContent = messages[msgIdx];
    }, 2000);

    // Saat iframe selesai load
    iframe.addEventListener('load', function() {
      clearInterval(msgInterval);
      statusText.textContent = 'Siap!';

      // Tampilkan iframe, sembunyikan loading
      setTimeout(function() {
        iframe.classList.add('loaded');
        loadingScreen.classList.add('fade-out');
        setTimeout(function() {
          loadingScreen.style.display = 'none';
        }, 500);
      }, 300);
    });

    // Fallback: kalau 15 detik belum load, tetap tampilkan iframe
    setTimeout(function() {
      if (!iframe.classList.contains('loaded')) {
        clearInterval(msgInterval);
        iframe.classList.add('loaded');
        loadingScreen.classList.add('fade-out');
        setTimeout(function() { loadingScreen.style.display = 'none'; }, 500);
      }
    }, 15000);
  </script>

</body>
</html>
